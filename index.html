    [x-cloak] { display: none !important; }

    .hero-principle {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        text-align: center;
        position: relative;
        z-index: 10;
    }

    .hero-principle-title {
        font-size: clamp(3.8rem, 9vw, 8rem);
        line-height: 0.98;
        font-weight: 700;
    }

    .principle-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
    }

    .principle-icon-box {
        width: 96px;
        height: 96px;
        margin: 0 auto;
        border-radius: 1.8rem;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

    .principle-point {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }

        position: absolute;
        top: 2rem;
        right: 2rem;
        z-index: 30;

            top: 1.2rem;
            right: 1.2rem;
        }

<body 
    class="min-h-screen font-sans text-white overflow-hidden"
    x-data="splashApp()"
    x-init="loadVideo()">

    <!-- VIDEO BACKGROUND -->
    <video 
        x-ref="bgVideo"
        class="splash-video"
        autoplay
        muted
        loop
        playsinline>
    </video>

    <div class="splash-overlay"></div>
    <div class="splash-noise"></div>

    <!-- DOTS CORNER -->
    <div class="corner-dots flex items-center gap-3">
        <template x-for="(slide, index) in slides" :key="slide.title">
            <button 
                type="button"
                @click="goToSlide(index)"
                class="dot rounded-full"
                :class="index <= current 
                    ? 'w-10 h-3 bg-emerald-400 shadow-[0_0_20px_rgba(34,197,94,0.65)]' 
                    : 'w-3 h-3 bg-white/35 hover:bg-white/60'">
            </button>
        </template>
    </div>

    <!-- MAIN SPLASH HERO -->
   <main class="relative z-10 min-h-screen flex items-center justify-center px-6 md:px-10 lg:px-16">

    <!-- DOTS -->
    <div class="corner-dots flex items-center gap-3">
        <template x-for="(slide, index) in slides" :key="slide.title">
            <button 
                type="button"
                @click="goToSlide(index)"
                class="dot rounded-full"
                :class="index <= current 
                    ? 'w-10 h-3 bg-emerald-400 shadow-[0_0_20px_rgba(34,197,94,0.65)]' 
                    : 'w-3 h-3 bg-white/35 hover:bg-white/60'">
            </button>
        </template>
    </div>

    <section class="hero-principle" :key="current">

        <div class="slide-animate">

            <!-- Badge -->
            <div class="mb-8 flex items-center justify-center gap-4">
                <div 
                    class="principle-badge"
                    :class="slides[current].badgeClass">
                    <i :class="slides[current].icon"></i>
                    <span x-text="slides[current].label"></span>
                </div>

                <p class="text-xs md:text-sm font-bold tracking-widest text-white/75">
                    <span x-text="current + 1"></span> / <span x-text="slides.length"></span>
                </p>
            </div>

            <!-- Icon -->
            <div 
                class="principle-icon-box mb-8"
                :class="slides[current].iconBox">
                <i :class="slides[current].icon" class="text-4xl md:text-5xl"></i>
            </div>

            <!-- Title -->
            <h1 class="hero-principle-title font-serif mb-6">
                <span x-text="slides[current].title"></span><span class="text-brand-accent">.</span>
            </h1>

            <!-- Desc -->
            <p class="max-w-4xl mx-auto text-base md:text-2xl text-slate-100/90 leading-relaxed mb-12" x-text="slides[current].description"></p>

            <!-- Points -->
         <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-5xl mx-auto mb-14">
            <template x-for="point in slides[current].points" :key="point.title">
    <div class="principle-point rounded-3xl p-6 md:p-7 text-left">
        <i class="fa-solid fa-check text-emerald-400 mb-4"></i>

        <h3 class="text-white font-bold text-base md:text-lg mb-2" x-text="point.title"></h3>

        <p class="text-sm text-white/75 leading-relaxed" x-text="point.desc"></p>
    </div>
</template>
            </div>

            <!-- Bottom Controls -->
            <!-- Bottom Controls -->
<div class="flex flex-col md:flex-row md:items-center md:justify-center gap-4 -translate-y-6 md:-translate-y-8">
    <button 
        type="button"
        x-show="current > 0"
        @click="prevSlide()"
        class="px-7 py-4 rounded-2xl bg-white/10 border border-white/10 text-white text-xs font-bold tracking-widest uppercase hover:bg-white/15 transition">
        Back
    </button>

    <button 
        type="button"
        @click="nextSlide()"
        class="px-8 py-4 rounded-2xl bg-gradient-to-r from-brand to-brand-accent text-white text-xs font-bold tracking-widest uppercase hover:shadow-[0_12px_28px_rgba(244,114,182,0.32)] transition-all">
        <span x-text="current === slides.length - 1 ? 'Masuk ke Login' : 'Next'"></span>
        <i class="fa-solid fa-arrow-right ml-2"></i>
    </button>
</div>

        </div>

    </section>
</main>

    <script>
        function splashApp() {
            return {
                current: 0,

slides: [
    {
        label: 'Principle 01',

        icon: 'fa-solid fa-lightbulb',
        badgeClass: 'bg-yellow-400/10 border-yellow-400/25 text-yellow-300',

        ]
    },
    {
        label: 'Principle 02',
        title: 'Critical Thinking',
        icon: 'fa-solid fa-brain',
        badgeClass: 'bg-cyan-400/10 border-cyan-400/25 text-cyan-300',
        iconBox: 'bg-cyan-400/10 border-cyan-400/25 text-cyan-300',
        glow: 'bg-cyan-400/20',
        video: 'https://assets.mixkit.co/videos/4802/4802-720.mp4',
        description: 'Saya percaya berpikir kritis adalah kemampuan untuk tidak langsung menerima sesuatu apa adanya, tetapi menelaah data, konteks, akar masalah, dan konsekuensi sebelum mengambil keputusan.',

            {
                title: 'Question the Problem',

    },
    {
        label: 'Principle 03',
        title: 'Sustainability',
        icon: 'fa-solid fa-leaf',
        badgeClass: 'bg-emerald-400/10 border-emerald-400/25 text-emerald-300',
        iconBox: 'bg-emerald-400/10 border-emerald-400/25 text-emerald-300',
        glow: 'bg-emerald-400/20',
        video: 'https://assets.mixkit.co/active_storage/video_items/100415/1724198576/100415-video-720.mp4',

    },
    {
        label: 'Principle 04',
        title: 'Growth',

        description: 'Saya percaya pertumbuhan tidak datang dari hasil instan, tetapi dari proses belajar, mencoba, menerima evaluasi, dan terus meningkatkan kapasitas diri.',
        points: [
            {
                title: 'Learning Mindset',
                desc: 'Belajar dari pengalaman, kegagalan, dan proses yang pernah dilewati untuk menjadi lebih baik.'
            },
            {
                title: 'Feedback Driven',
                desc: 'Berani menerima feedback dan evaluasi sebagai bahan untuk memperbaiki arah dan kualitas diri.'
            },
            {
                title: 'Consistent Improvement',
                desc: 'Terus meningkatkan kapasitas diri secara konsisten dalam aspek personal dan profesional.'
            }
        ]
    }
],    
loadVideo() {
                    this.$nextTick(() => {
                        const video = this.$refs.bgVideo;
                        video.src = this.slides[this.current].video;
                        video.load();
                        video.play().catch(() => {});
                    });
                },

                changeVideo() {
                    const video = this.$refs.bgVideo;
                    video.style.opacity = 0;

                    setTimeout(() => {
                        video.src = this.slides[this.current].video;
                        video.load();
                        video.play().catch(() => {});
                        video.style.opacity = 1;
                    }, 250);
                },

                goToSlide(index) {
                    this.current = index;
                    this.changeVideo();
                },

                nextSlide() {
                    if (this.current < this.slides.length - 1) {
                        this.current++;
                        this.changeVideo();
                    } else {
                        window.location.href = 'login.html';
                    }
                },

                prevSlide() {
                    if (this.current > 0) {
                        this.current--;
                        this.changeVideo();
                    }
                }
            }
        }
    </script>

</body>
